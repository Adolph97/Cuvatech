name: Deploy Cuva Tech to cPanel

on:
  push:
    branches:
      - main # This triggers the workflow on pushes to the main branch

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy to cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check client and server
        run: pnpm run lint

      - name: Build production artifact
        run: pnpm run build

      - name: Verify production PHP API contract
        run: pnpm run test:production-api -- dist/api.php

      - name: Verify built PHP API response
        run: |
          php -S 127.0.0.1:8080 -t dist > /tmp/cuva-php.log 2>&1 &
          php_pid=$!
          trap 'kill "$php_pid"' EXIT
          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1:8080/api.php?path=settings/public > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              cat /tmp/cuva-php.log
              exit 1
            fi
            sleep 1
          done
          PRODUCTION_API_URL=http://127.0.0.1:8080/api.php?path=settings/public pnpm run test:production-api

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Where to upload on cPanel (usually /public_html/ or an addon domain folder)
          server-dir: /public_html/
          # Which files to upload. (See 'The Next.js Gotcha' below)
          local-dir: ./dist/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            products.json
            orders.json
            config.json
            uploads/**
          dangerous-clean-slate: false
