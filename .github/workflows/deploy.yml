name: Deploy Next.js to Namecheap cPanel

on:
  push:
    branches:
      - main # This triggers the workflow on pushes to the main branch

jobs:
  build-and-deploy:
    name: Build and Deploy to cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Update this if you use a different Node version

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Project
        run: npm run build

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Where to upload on cPanel (usually /public_html/ or an addon domain folder)
          server-dir: /public_html/
          # Which files to upload. (See 'The Next.js Gotcha' below)
          local-dir: ./out/
